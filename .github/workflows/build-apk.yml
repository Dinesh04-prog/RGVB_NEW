name: Build NexusPOS Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:       # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Build React web app ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexus-react-pos/package-lock.json

      - name: Install dependencies
        working-directory: nexus-react-pos
        run: npm ci

      - name: Build web app
        working-directory: nexus-react-pos
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: "786802419853-8m6fpah9na9ecdhfc8fo8d55e3b5r728.apps.googleusercontent.com"
          VITE_OWNER_EMAIL: "rajendragvb2801@gmail.com"
          VITE_OWNER_PHONE: "917385391971"
          VITE_APP_URL: "https://appassets.androidplatform.net"
          VITE_FIREBASE_API_KEY: "AIzaSyArkZiqGAUJRqiBKQmYndBWTfpDq-4SWiM"
          VITE_FIREBASE_AUTH_DOMAIN: "nexus-pos-817c3.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "nexus-pos-817c3"
          VITE_FIREBASE_STORAGE_BUCKET: "nexus-pos-817c3.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "77380160715"
          VITE_FIREBASE_APP_ID: "1:77380160715:web:c6cd94906ee7fcc24b9f4e"
          VITE_FIREBASE_MEASUREMENT_ID: "G-QSGXW4SQLV"

      # ── 3. Copy web build into Android assets ────────────────────────────────
      - name: Copy dist → Android assets
        run: |
          mkdir -p nexus-android/app/src/main/assets
          cp -r nexus-react-pos/dist/. nexus-android/app/src/main/assets/

      # ── 4. Generate app icons from company logo ──────────────────────────────
      - name: Generate app icons from shop-logo.jpeg
        run: |
          pip install Pillow --quiet
          python3 - <<'EOF'
          import os
          from PIL import Image, ImageDraw

          logo = Image.open("nexus-react-pos/public/shop-logo.jpeg").convert("RGBA")

          sizes = {
              "mdpi":    48,
              "hdpi":    72,
              "xhdpi":   96,
              "xxhdpi":  144,
              "xxxhdpi": 192,
          }

          for dpi, size in sizes.items():
              out = f"nexus-android/app/src/main/res/mipmap-{dpi}"
              os.makedirs(out, exist_ok=True)

              img = logo.resize((size, size), Image.LANCZOS)

              # Square launcher icon
              bg = Image.new("RGBA", (size, size), (255, 255, 255, 255))
              bg.paste(img, mask=img.split()[3])
              bg.convert("RGB").save(f"{out}/ic_launcher.png")

              # Round launcher icon (circular crop with white bg)
              mask = Image.new("L", (size, size), 0)
              ImageDraw.Draw(mask).ellipse((0, 0, size - 1, size - 1), fill=255)
              bg2 = Image.new("RGBA", (size, size), (255, 255, 255, 255))
              bg2.paste(img, mask=mask)
              bg2.convert("RGB").save(f"{out}/ic_launcher_round.png")

          print("Icons generated successfully")
          EOF

      # ── 5. Build Android APK ─────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Build release APK
        working-directory: nexus-android
        run: gradle assembleRelease --no-daemon

      # ── 6. Upload APK as downloadable artifact ───────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusPOS-${{ github.run_number }}
          path: nexus-android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 7. Print download instructions in the run log ────────────────────────
      - name: Print install instructions
        run: |
          echo "========================================"
          echo "  APK build complete!"
          echo "  Go to: Actions tab → this run → Artifacts"
          echo "  Download: NexusPOS-${{ github.run_number }}"
          echo "  Transfer to phone → install → allow 'Install unknown apps'"
          echo "========================================"
