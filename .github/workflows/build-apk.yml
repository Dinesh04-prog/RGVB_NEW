name: Build NexusPOS Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:       # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Build React web app ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexus-react-pos/package-lock.json

      - name: Install dependencies
        working-directory: nexus-react-pos
        run: npm ci

      - name: Build web app
        working-directory: nexus-react-pos
        run: npm run build
        env:
          # Pass all VITE_ secrets from GitHub Secrets so the build works
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      # ── 3. Copy web build into Android assets ────────────────────────────────
      - name: Copy dist → Android assets
        run: |
          mkdir -p nexus-android/app/src/main/assets/www
          cp -r nexus-react-pos/dist/. nexus-android/app/src/main/assets/www/

      # ── 4. Build Android APK ─────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        working-directory: nexus-android
        run: gradle wrapper --gradle-version 8.6

      - name: Build release APK
        working-directory: nexus-android
        run: ./gradlew assembleRelease --no-daemon

      # ── 5. Upload APK as downloadable artifact ───────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusPOS-${{ github.run_number }}
          path: nexus-android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # ── 6. Print download instructions in the run log ────────────────────────
      - name: Print install instructions
        run: |
          echo "========================================"
          echo "  APK build complete!"
          echo "  Go to: Actions tab → this run → Artifacts"
          echo "  Download: NexusPOS-${{ github.run_number }}"
          echo "  Transfer to phone → install → allow 'Install unknown apps'"
          echo "========================================"
